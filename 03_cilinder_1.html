<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>03 - Цилиндр (Полный чертеж)</title>
    <style>
        body { margin: 0; background: #f4f5f7; color: #333; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; }
        .toolbar { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: #f4f5f7; border: 2px solid #a5a5a5; border-radius: 50px; padding: 6px 10px; display: flex; gap: 6px; align-items: center; box-shadow: 0 6px 16px rgba(0,0,0,0.12); z-index: 100; }
        button { padding: 11px 18px; font-size: 14px; cursor: pointer; background: white; border: 2px solid #a5a5a5; color: #222; border-radius: 40px; font-weight: 600; transition: all 0.15s; outline: none; }
        button:hover { background: #e8e9ed; }
        button.active { background: #0066ff; color: white; border-color: #0066ff; }
        .btn-back { background: #222 !important; color: white !important; border: none !important; }
        .controls-panel { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); background: #f4f5f7; border: 2px solid #a5a5a5; border-radius: 16px; padding: 16px 20px; display: none; grid-template-columns: 1fr 1fr; gap: 12px 20px; font-size: 13.5px; z-index: 110; box-shadow: 0 8px 25px rgba(0,0,0,0.15); min-width: 440px; }
        .draw-panel { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); background: #f4f5f7; border: 2px solid #a5a5a5; border-radius: 16px; padding: 12px 20px; display: none; gap: 20px; align-items: center; box-shadow: 0 8px 25px rgba(0,0,0,0.15); z-index: 90; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 12px; color: #555; }
        .color-dot { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #a5a5a5; cursor: pointer; }
        .control-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #0066ff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-back" onclick="location.href='index.html'">← В МЕНЮ</button>
        <button id="btnDrawMode" onclick="toggleDrawMode()">✏️ РИСОВАТЬ</button>
        <button onclick="clearSketch()" style="border-color:#c33; color:#c33;">Очистить</button>
        <button onclick="toggleControls()">⚙️ Настройки</button>
    </div>

    <div id="drawPanel" class="draw-panel">
        <div class="control-group">
            <div style="display:flex; gap:8px;">
                <div class="color-dot" style="background:#222;" onclick="brushColor='#222'"></div>
                <div class="color-dot" style="background:#0066ff;" onclick="brushColor='#0066ff'"></div>
                <div class="color-dot" style="background:#c33;" onclick="brushColor='#c33'"></div>
            </div>
            <span>Цвет</span>
        </div>
        <div class="control-group">
            <input type="range" min="1" max="30" value="5" oninput="brushSize=Number(this.value)">
            <span>Толщина</span>
        </div>
    </div>

    <div id="controlsPanel" class="controls-panel">
        <div class="control-item"><b>Высота:</b> <input type="range" min="0" max="700" value="280" id="hRange" oninput="cylHeight=Number(this.value); draw()"></div>
        <div class="control-item"><input type="checkbox" id="chCylSides" checked onchange="showCylSides=this.checked; draw()"> <b>Стенки цилиндра</b></div>
        <div class="control-item"><input type="checkbox" id="chEllipse" checked onchange="showEllipse=this.checked; draw()"> Эллипсы</div>
        <div class="control-item"><input type="checkbox" id="chHorizon" checked onchange="showHorizon=this.checked; draw()"> Линия горизонта</div>
        <div class="control-item"><input type="checkbox" id="chFill" checked onchange="showFill=this.checked; draw()"> Заполнение плоскостей</div>
        <div class="control-item"><input type="checkbox" id="chFront" checked onchange="showFront=this.checked; draw()"> Передние стороны</div>
        <div class="control-item"><input type="checkbox" id="chBack" checked onchange="showBack=this.checked; draw()"> Задние стороны</div>
        <div class="control-item"><input type="checkbox" id="chSides" checked onchange="showSides=this.checked; draw()"> Боковые стороны</div>
        <div class="control-item"><input type="checkbox" id="chToV" checked onchange="showToVanishing=this.checked; draw()"> Линии к точке V</div>
        <div class="control-item"><input type="checkbox" id="chHorizAxis" checked onchange="showHorizontalAxis=this.checked; draw()"> Горизонтальные оси</div>
        <div class="control-item"><input type="checkbox" id="chVertAxis" checked onchange="showVerticalAxis=this.checked; draw()"> Вертикальная ось</div>
        <div class="control-item"><input type="checkbox" id="chDiag1" checked onchange="showDiagonal1=this.checked; draw()"> Диагональ 1</div>
        <div class="control-item"><input type="checkbox" id="chDiag2" checked onchange="showDiagonal2=this.checked; draw()"> Диагональ 2</div>
    </div>

    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let w, h, drag = null, dragOffsetX = 0, dragOffsetY = 0;
let isDrawing = false, isPainting = false, brushColor = '#222', brushSize = 5, sketch = [];

let dist = 450, cylHeight = 280;
let showCylSides = true, showEllipse = true, showHorizon = true, showFront = true, showBack = true, showSides = true;
let showToVanishing = true, showFill = true, showVerticalAxis = true, showHorizontalAxis = true, showDiagonal1 = true, showDiagonal2 = true;

const v = { x: 0, y: 0 };
const base = { a: {x: 0, y: 0}, b: {x: 0, y: 0} };

function init() {
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    v.y = h * 0.35;
    if (base.a.x === 0) {
        base.a.x = w / 2 - 150; base.a.y = v.y + 220;
        base.b.x = w / 2 + 150; base.b.y = v.y + 220;
    }
    v.x = (base.a.x + base.b.x) / 2;
    draw();
}

function toggleControls() { const p = document.getElementById('controlsPanel'); p.style.display = (p.style.display === 'none' || p.style.display === '') ? 'grid' : 'none'; }
function toggleDrawMode() { isDrawing = !isDrawing; document.getElementById('btnDrawMode').classList.toggle('active', isDrawing); document.getElementById('drawPanel').style.display = isDrawing ? 'flex' : 'none'; draw(); }
function clearSketch() { sketch = []; draw(); }

function intersect(p1, p2, p3, p4) {
    const denom = (p4.y - p3.y) * (p2.x - p1.x) - (p4.x - p3.x) * (p2.y - p1.y);
    if (Math.abs(denom) < 0.0001) return null;
    const ua = ((p4.x - p3.x) * (p1.y - p3.y) - (p4.y - p3.y) * (p1.x - p3.x)) / denom;
    return { x: p1.x + ua * (p2.x - p1.x), y: p1.y + ua * (p2.y - p1.y) };
}

function getSq(yF) {
    v.x = (base.a.x + base.b.x) / 2;
    const a = { x: base.a.x, y: yF }, b = { x: base.b.x, y: yF };
    const d1 = { x: v.x - dist, y: v.y }, d2 = { x: v.x + dist, y: v.y };
    const c = intersect(a, v, b, d1), d = intersect(b, v, a, d2);
    return { a, b, c, d };
}

function getEllParams(s) {
    const ey = (s.a.y + s.c.y) / 2, ry = Math.abs(s.a.y - s.c.y) / 2;
    const k = Math.abs((s.a.x - v.x) / (s.a.y - v.y));
    const rx = k * Math.sqrt(Math.abs(v.y - s.a.y) * Math.abs(v.y - s.c.y));
    return { ex: v.x, ey, rx, ry };
}

function drawExtendedLine(p1, p2, ext) {
    const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.hypot(dx, dy);
    if (len === 0) return;
    ctx.beginPath();
    ctx.moveTo(p1.x - (dx/len)*ext, p1.y - (dy/len)*ext);
    ctx.lineTo(p2.x + (dx/len)*ext, p2.y + (dy/len)*ext);
    ctx.stroke();
}

function draw() {
    ctx.clearRect(0, 0, w, h); ctx.setLineDash([]);
    const sqB = getSq(base.a.y), sqT = getSq(base.a.y - cylHeight);
    if (!sqB.c || !sqT.c) return;
    const ellB = getEllParams(sqB), ellT = getEllParams(sqT);

    if (showFill) {
        ctx.fillStyle = 'rgba(0, 80, 180, 0.04)';
        [sqB, sqT].forEach(s => { ctx.beginPath(); ctx.moveTo(s.a.x, s.a.y); ctx.lineTo(s.b.x, s.b.y); ctx.lineTo(s.d.x, s.d.y); ctx.lineTo(s.c.x, s.c.y); ctx.fill(); });
    }

    if (showEllipse) {
        ctx.lineWidth = 3; ctx.strokeStyle = '#0066ff';
        [ellB, ellT].forEach(e => { ctx.beginPath(); ctx.ellipse(e.ex, e.ey, e.rx, e.ry, 0, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = 'rgba(0,102,255,0.06)'; ctx.fill(); });
    }

    if (showCylSides) {
        ctx.lineWidth = 3; ctx.strokeStyle = '#222';
        ctx.beginPath(); ctx.moveTo(ellB.ex - ellB.rx, ellB.ey); ctx.lineTo(ellT.ex - ellT.rx, ellT.ey); ctx.moveTo(ellB.ex + ellB.rx, ellB.ey); ctx.lineTo(ellT.ex + ellT.rx, ellT.ey); ctx.stroke();
    }

    ctx.lineWidth = 2.5; ctx.strokeStyle = '#222';
    [sqB, sqT].forEach(s => {
        if (showFront) { ctx.beginPath(); ctx.moveTo(s.a.x, s.a.y); ctx.lineTo(s.b.x, s.b.y); ctx.stroke(); }
        if (showBack) { ctx.beginPath(); ctx.moveTo(s.c.x, s.c.y); ctx.lineTo(s.d.x, s.d.y); ctx.stroke(); }
        if (showSides) { ctx.beginPath(); ctx.moveTo(s.a.x, s.a.y); ctx.lineTo(s.c.x, s.c.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(s.b.x, s.b.y); ctx.lineTo(s.d.x, s.d.y); ctx.stroke(); }
    });

    if (showToVanishing) {
        ctx.lineWidth = 1.2; ctx.strokeStyle = '#0066ff'; ctx.setLineDash([6, 6]);
        [sqB, sqT].forEach(s => { ctx.beginPath(); ctx.moveTo(s.a.x, s.a.y); ctx.lineTo(v.x, v.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(s.b.x, s.b.y); ctx.lineTo(v.x, v.y); ctx.stroke(); });
        ctx.setLineDash([]);
    }

    ctx.lineWidth = 1.2; ctx.strokeStyle = '#8a8a8a';
    if (showVerticalAxis) { 
        drawExtendedLine({x:v.x, y:sqB.a.y}, v, 40); 
        drawExtendedLine({x:v.x, y:sqT.a.y}, v, 40); // ВОТ ЭТА ДОБАВЛЕННАЯ СТРОКА
    }
    [sqB, sqT].forEach(s => {
        const pc = intersect(s.a, s.d, s.b, s.c);
        if (showHorizontalAxis && pc) {
            const xSide = v.x + (s.a.x - v.x) * (pc.y - v.y) / (s.a.y - v.y);
            drawExtendedLine({x: xSide, y: pc.y}, {x: v.x + (v.x - xSide), y: pc.y}, 30);
        }
        if (showDiagonal1) { ctx.beginPath(); ctx.moveTo(s.a.x, s.a.y); ctx.lineTo(s.d.x, s.d.y); ctx.stroke(); }
        if (showDiagonal2) { ctx.beginPath(); ctx.moveTo(s.b.x, s.b.y); ctx.lineTo(s.c.x, s.c.y); ctx.stroke(); }
    });

    if (showHorizon) {
        ctx.strokeStyle = '#f8ad00'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(0, v.y); ctx.lineTo(w, v.y); ctx.stroke();
        ctx.beginPath(); ctx.arc(v.x, v.y, 8, 0, Math.PI * 2); ctx.fillStyle = '#c33'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }

    if (!isDrawing) {
        [sqB, sqT].forEach((s, i) => {
            const isT = (i === 1);
            [[s.a.x, s.a.y], [s.b.x, s.b.y]].forEach(p => { ctx.beginPath(); ctx.arc(p[0], p[1], 6, 0, Math.PI * 2); ctx.fillStyle = '#0066ff'; ctx.fill(); });
            ctx.beginPath(); ctx.arc(v.x, s.c.y, 8, 0, Math.PI * 2); ctx.fillStyle = '#00cc66'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath(); ctx.arc(v.x, s.a.y, 8, 0, Math.PI * 2); ctx.fillStyle = isT ? '#ff9900' : '#0066ff'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        });
    }

    if (sketch.length) {
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        sketch.forEach(l => { ctx.beginPath(); ctx.strokeStyle = l.c; ctx.lineWidth = l.s; ctx.moveTo(l.p[0].x, l.p[0].y); for (let i = 1; i < l.p.length; i++) ctx.lineTo(l.p[i].x, l.p[i].y); ctx.stroke(); });
    }
}

window.onmousedown = e => {
    const m = { x: e.clientX, y: e.clientY };
    if (isDrawing) { isPainting = true; sketch.push({ c: brushColor, s: brushSize, p: [m] }); return; }
    const sqB = getSq(base.a.y), sqT = getSq(base.a.y - cylHeight);

    if (Math.hypot(v.x - m.x, v.y - m.y) < 20) { drag = { type: 'v' }; return; }
    if (Math.hypot(v.x - m.x, sqT.a.y - m.y) < 15) { drag = { type: 'h' }; return; }
    if (Math.hypot(v.x - m.x, sqB.a.y - m.y) < 15) { drag = { type: 'move' }; return; }
    if (Math.hypot(v.x - m.x, sqB.c.y - m.y) < 15) { drag = { type: 'd', yF: sqB.a.y }; dragOffsetY = sqB.c.y - m.y; return; }
    if (Math.hypot(v.x - m.x, sqT.c.y - m.y) < 15) { drag = { type: 'd', yF: sqT.a.y }; dragOffsetY = sqT.c.y - m.y; return; }
    if (Math.hypot(base.a.x - m.x, base.a.y - m.y) < 15 || Math.hypot(base.b.x - m.x, base.b.y - m.y) < 15) { drag = { type: 'wB' }; dragOffsetY = base.a.y - m.y; return; }
    if (Math.hypot(sqT.a.x - m.x, sqT.a.y - m.y) < 15 || Math.hypot(sqT.b.x - m.x, sqT.b.y - m.y) < 15) { drag = { type: 'wT' }; return; }
};

window.onmousemove = e => {
    const m = { x: e.clientX, y: e.clientY };
    if (isPainting && sketch.length > 0) { sketch[sketch.length - 1].p.push(m); draw(); return; }
    if (!drag) return;
    if (drag.type === 'v') { v.y = m.y; } 
    else if (drag.type === 'h') { cylHeight = base.a.y - m.y; document.getElementById('hRange').value = cylHeight; } 
    else if (drag.type === 'move') { const dx = m.x - v.x, dy = m.y - base.a.y; base.a.x += dx; base.a.y += dy; base.b.x += dx; base.b.y += dy; } 
    else if (drag.type === 'wB' || drag.type === 'wT') {
        if (drag.type === 'wB') base.a.y = base.b.y = m.y + dragOffsetY;
        else cylHeight = base.a.y - m.y;
        const dx = Math.abs(m.x - v.x); base.a.x = v.x - dx; base.b.x = v.x + dx;
    }
    else if (drag.type === 'd') {
        const yF = drag.yF, wF = Math.abs(base.b.x - base.a.x);
        const tY = (yF > v.y) ? Math.max(v.y + 5, Math.min(yF - 5, m.y + dragOffsetY)) : Math.min(v.y - 5, Math.max(yF + 5, m.y + dragOffsetY));
        dist = Math.abs(wF * (v.y - tY) / (tY - yF));
    } 
    draw();
};

window.onmouseup = () => { drag = null; isPainting = false; };
window.onresize = init;
init();
</script>
</body>
</html>
